spring.application.name=uniride

# memory (default) | postgres | supabase
app.persistence.mode=${APP_PERSISTENCE_MODE:memory}

# Postgres config used when APP_PERSISTENCE_MODE=postgres
postgres.url=${POSTGRES_URL:}
postgres.user=${POSTGRES_USER:}
postgres.password=${POSTGRES_PASSWORD:}
postgres.schema=${POSTGRES_SCHEMA:public}

# Supabase config used when APP_PERSISTENCE_MODE=supabase
supabase.url=${SUPABASE_URL:}
supabase.service-key=${SUPABASE_SERVICE_KEY:}
supabase.schema=${SUPABASE_SCHEMA:public}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Jackson config to ensure dates are serialized as ISO strings
spring.jackson.serialization.write-dates-as-timestamps=false
